services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lingua-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lingua_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - lingua_db_data:/var/lib/postgresql/data

volumes:
  lingua_db_data: